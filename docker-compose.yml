version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - svt_data:/data
    environment:
      - SVT_DATA_DIR=/data
    restart: unless-stopped
    networks:
      - svt_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - svt_net

volumes:
  svt_data:

networks:
  svt_net:
